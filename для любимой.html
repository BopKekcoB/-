<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У меня есть вопрос...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: #4a4a4a;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        h1 { font-size: 24px; margin-bottom: 30px; }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        #btn-yes {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        #btn-no {
            background-color: #e0e0e0;
            color: #666;
            position: absolute; /* Важно для перемещения */
        }

        /* Скрытое сообщение */
        #success-message {
            display: none;
            margin-top: 20px;
            font-size: 20px;
            color: #ff4d6d;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1 id="question">Ты меня любишь? ❤️</h1>
        
        <div class="buttons" id="btn-container">
            <button class="btn" id="btn-yes" onclick="showLove()">Да</button>
            <button class="btn" id="btn-no">Нет</button>
        </div>

        <div id="success-message">
            Я тоже тебя очень сильно люблю! 💖✨
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('btn-no');
        const yesBtn = document.getElementById('btn-yes');
        const successMessage = document.getElementById('success-message');
        const question = document.getElementById('question');
        const btnContainer = document.getElementById('btn-container');

        // Логика убегающей кнопки
        noBtn.addEventListener('mouseover', () => {
            // Рассчитываем случайные координаты внутри окна
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });

        // Если она все-таки умудрится нажать (на мобильном, например)
        noBtn.addEventListener('click', () => {
            alert('Попробуй еще раз! 😉');
        });

        // Логика при нажатии на "Да"
        function showLove() {
            question.innerText = "Ура! 🥰";
            btnContainer.style.display = 'none';
            successMessage.style.display = 'block';
            
            // Добавим немного праздника
            launchConfetti();
        }

        // Простой эффект конфетти
        function launchConfetti() {
            for(let i = 0; i < 50; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.transition = 'transform 3s linear, opacity 3s';
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.style.transform = `translateY(-110vh) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                }, 100);

                setTimeout(() => heart.remove(), 4000);
            }
        }
    </script>
</body>
</html>
