<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У меня есть вопрос...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        h1 { color: #ff4d6d; margin-bottom: 40px; }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 30px; /* Расстояние между кнопками */
            min-height: 60px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #btn-yes {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        #btn-no {
            background-color: #f0f0f0;
            color: #888;
            position: relative; /* Начальная позиция */
            z-index: 999;
        }

        #success {
            display: none;
            font-size: 24px;
            color: #ff4d6d;
            animation: heartBeat 1.2s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="quiz">
            <h1>Ты меня любишь? ❤️</h1>
            <div class="btn-group">
                <button class="btn" id="btn-yes" onclick="celebrate()">Да</button>
                <button class="btn" id="btn-no">Нет</button>
            </div>
        </div>
        
        <div id="success">
            Я знал! Я тоже тебя люблю! 💖✨
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('btn-no');
        const quiz = document.getElementById('quiz');
        const success = document.getElementById('success');

        // Логика убегания кнопки "Нет"
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton); // Для телефонов

        function moveButton() {
            // Кнопка становится абсолютной, чтобы летать по всему экрану
            noBtn.style.position = 'fixed';
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function celebrate() {
            quiz.style.display = 'none';
            success.style.display = 'block';
            
            // Запуск сердечек
            for(let i=0; i<30; i++) {
                createHeart();
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heart.style.zIndex = '1000';
            document.body.appendChild(heart);

            const animation = heart.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: `translateY(-110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: Math.random() * 3000 + 2000,
                easing: 'linear'
            });

            animation.onfinish = () => heart.remove();
        }
    </script>
</body>
</html>
